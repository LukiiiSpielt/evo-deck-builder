name: Build

on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux

          - os: windows-latest
            artifact: windows

          - os: macos-13
            artifact: macos-intel
            arch: x86_64

          - os: macos-14
            artifact: macos-silicon
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller main.spec

      - name: Upload pyinstaller results
        uses: actions/upload-artifact@v4
        with:
          name: evoDeckBuilder-${{ matrix.artifact }}
          path: dist/